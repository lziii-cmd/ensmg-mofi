<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable — ENSMG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root { --navy: #1a2340; --accent: #4f6ef7; }
        body { background: #f0f2f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(26,35,64,.12); padding: 3rem 4rem; text-align: center; max-width: 520px; }
        .error-code { font-size: 6rem; font-weight: 800; color: var(--accent); line-height: 1; }
        .error-icon { font-size: 3rem; color: var(--navy); margin-bottom: .5rem; }
        h1 { font-size: 1.6rem; font-weight: 700; color: var(--navy); }
        p { color: #718096; }
        .btn-home { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: .6rem 1.6rem; font-weight: 600; text-decoration: none; }
        .btn-home:hover { background: #3d5ae3; color: #fff; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon"><i class="bi bi-compass"></i></div>
        <div class="error-code">404</div>
        <h1 class="mt-2">Page introuvable</h1>
        <p class="mb-4">La page que vous recherchez n'existe pas ou a été déplacée.</p>
        <a href="/" class="btn-home">
            <i class="bi bi-house-fill me-1"></i> Retour à l'accueil
        </a>
    </div>
</body>
</html>
