<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — ENSMG Certification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a2340 0%, #2e3d6b 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 18px;
            padding: 2.5rem 2rem;
            width: 100%; max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        .brand-icon {
            width: 56px; height: 56px;
            background: #4f6ef7;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; color: #fff;
            margin: 0 auto 1rem;
            box-shadow: 0 4px 16px rgba(79,110,247,0.4);
        }
        .form-control {
            border-radius: 8px;
            font-size: 0.88rem;
            padding: 0.5rem 0.85rem;
        }
        .btn-login {
            background: #4f6ef7;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            padding: 0.6rem;
            width: 100%;
            color: #fff;
            font-size: 0.9rem;
        }
        .btn-login:hover { background: #3d5ae3; color: #fff; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="text-center mb-4">
        <div class="brand-icon"><i class="bi bi-award-fill"></i></div>
        <h4 class="fw-bold mb-1" style="color:#1a2340;">ENSMG Certification</h4>
        <p class="text-muted" style="font-size:0.83rem;">Connectez-vous pour accéder à la plateforme</p>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger" style="font-size:0.84rem;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        Identifiants incorrects. Veuillez réessayer.
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="{{ form.username.id_for_label }}" class="form-label fw-500" style="font-size:0.86rem;">
                Email ou nom d'utilisateur
            </label>
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-person text-muted"></i></span>
                <input type="text" name="username" id="{{ form.username.id_for_label }}"
                       class="form-control border-start-0"
                       placeholder="adresse@email.com" autofocus required>
            </div>
        </div>
        <div class="mb-4">
            <label for="{{ form.password.id_for_label }}" class="form-label fw-500" style="font-size:0.86rem;">
                Mot de passe
            </label>
            <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" name="password" id="{{ form.password.id_for_label }}"
                       class="form-control border-start-0"
                       placeholder="Mot de passe" required>
            </div>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
        </button>
    </form>

    <div class="text-center mt-4 text-muted" style="font-size:0.72rem;">
        &copy; 2025 ENSMG Certification
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
