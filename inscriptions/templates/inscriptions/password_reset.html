{% extends "inscriptions/portail_base.html" %}
{% block title %}Réinitialiser mon mot de passe — ENSMG{% endblock %}
{% block content %}
<div style="max-width:460px;margin:4rem auto;padding:0 1rem;">
    <div style="background:#fff;border:1px solid #e8edf5;border-radius:16px;padding:2rem;">
        <div style="text-align:center;margin-bottom:1.75rem;">
            <div style="width:56px;height:56px;background:#eef1ff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.5rem;color:#4f6ef7;"><i class="bi bi-key"></i></div>
            <h4 style="font-weight:700;color:#1a2340;">Mot de passe oublié ?</h4>
            <p style="font-size:0.85rem;color:#718096;">Saisissez votre email et nous vous enverrons un lien de réinitialisation.</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Adresse email</label>
                <input type="email" name="email" class="form-control" placeholder="votre@email.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-envelope me-2"></i>Envoyer le lien de réinitialisation
            </button>
        </form>
        <div style="text-align:center;margin-top:1.25rem;">
            <a href="{% url 'login' %}" style="font-size:0.83rem;color:#718096;text-decoration:none;">
                <i class="bi bi-arrow-left me-1"></i>Retour à la connexion
            </a>
        </div>
    </div>
</div>
{% endblock %}
