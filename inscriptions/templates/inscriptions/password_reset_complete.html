{% extends "inscriptions/portail_base.html" %}
{% block title %}Mot de passe modifié — ENSMG{% endblock %}
{% block content %}
<div style="max-width:460px;margin:4rem auto;padding:0 1rem;">
    <div style="background:#fff;border:1px solid #e8edf5;border-radius:16px;padding:2rem;text-align:center;">
        <div style="width:56px;height:56px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.5rem;color:#15803d;"><i class="bi bi-check-circle"></i></div>
        <h4 style="font-weight:700;color:#1a2340;">Mot de passe modifié !</h4>
        <p style="font-size:0.85rem;color:#718096;margin-bottom:1.5rem;">Votre mot de passe a été mis à jour avec succès. Vous pouvez maintenant vous connecter.</p>
        <a href="{% url 'login' %}" class="btn btn-primary btn-sm px-4">
            <i class="bi bi-box-arrow-in-right me-1"></i>Se connecter
        </a>
    </div>
</div>
{% endblock %}
