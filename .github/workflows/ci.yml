name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: pip install black isort flake8

      - name: black
        run: black --check --line-length 100 .

      - name: isort
        run: isort --check-only --profile black --line-length 100 .

      - name: flake8
        run: flake8 --max-line-length 100 --extend-ignore E203,W503 --exclude migrations,venv,staticfiles .

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key-not-used-in-production
      DEBUG: "True"
      DATABASE_URL: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate --run-syncdb

      - name: Run tests
        run: pytest --cov=inscriptions --cov-report=term-missing -q
