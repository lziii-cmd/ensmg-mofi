[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '''
/(
    migrations
  | venv
  | staticfiles
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip = ["migrations", "venv", "staticfiles"]

[tool.flake8]
max-line-length = 100
extend-ignore = ["E203", "W503"]
exclude = ["migrations", "venv", "staticfiles", ".git", "__pycache__"]
per-file-ignores = [
    "*/migrations/*.py: E501",
]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "ensmg_mofi.settings"
python_files = ["tests/test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["inscriptions"]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/venv/*",
    "inscriptions/views_old.py",
    "inscriptions/admin.py",
]

[tool.coverage.report]
skip_empty = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
